# =============================================================================
# BKC AI Conference & Convening Deadlines — single source of truth
# =============================================================================
# Every venue on the site lives in this file. To add or update one, edit this
# file and open a pull request. Full schema + a copy-pasteable template:
# CONTRIBUTING.md.
#
# Ground rules:
#   * NEVER guess a deadline. If you can't verify it on the venue's own site,
#     write date: "TBA" — the site shows the venue in a "Deadline TBA" section.
#   * Dates: "YYYY-MM-DD HH:mm" (24h) or "YYYY-MM-DD" (treated as 23:59).
#   * timezone: "AoE" (Anywhere on Earth, UTC-12), "UTC", or an IANA name
#     like "America/New_York".
#   * Put "# VERIFY" next to any date a human should double-check before
#     relying on it.
#
# Dates below were last checked against venue sites on 2026-07-10.
# =============================================================================


